# Include this file inside server {} block:
#   include /path/to/nginx/locations.conf;
#
# Mount .htpasswd into the container:
#   volumes:
#     - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
#
# Client usage:
#   apt:    deb https://user:pass@linuxmirror.host/ubuntu noble main ...
#   pacman: Server = https://user:pass@linuxmirror.host/archlinux/$repo/os/$arch
#   apk:    https://user:pass@linuxmirror.host/alpine/v3.20/main

# Shared proxy settings
proxy_http_version  1.1;
proxy_set_header    Host          $proxy_host;
proxy_set_header    Connection    "";
proxy_set_header    Authorization "";   # strip creds before forwarding upstream
proxy_connect_timeout 10s;
proxy_read_timeout    120s;

location /ubuntu/ {
    auth_basic "Linux Mirror";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://up_ubuntu/ubuntu/;
}

location /ubuntu-security/ {
    auth_basic "Linux Mirror";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://up_ubuntu_sec/ubuntu/;
}

