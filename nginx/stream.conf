# Вставить в блок stream {} главного nginx.conf:
#   stream {
#       include /etc/nginx/stream.conf;
#   }
#
# Проверить что модуль собран: nginx -V 2>&1 | grep stream

server {
    listen 443;
    listen [::]:443;

    proxy_pass          127.0.0.1:3050;
    proxy_connect_timeout 10s;
    proxy_timeout       600s;   # держим долгие VLESS-соединения
}
