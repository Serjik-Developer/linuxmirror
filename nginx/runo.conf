# nginx config for the runo panel server — replaces Caddy.
#
# Domains:
#   testing-dsajgfsdfg.mooo.com  → remnawave panel  (127.0.0.1:3000)
#   update.linuxmirror.host      → subscription page (127.0.0.1:3010)
#   api.linuxmirror.host         → bot (127.0.0.1:40080) + frontend (127.0.0.1:3080)
#
# Before deploying:
#   1. Add port mapping to runo-frontend in docker-compose:
#        ports: ["127.0.0.1:3080:80"]
#      then: docker compose up -d runo-frontend
#   2. Obtain TLS certs (see deploy-runo.sh).
#
# Place as /etc/nginx/conf.d/runo.conf

# ── Remnawave panel ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name testing-dsajgfsdfg.mooo.com;

    ssl_certificate     /etc/letsencrypt/live/testing-dsajgfsdfg.mooo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testing-dsajgfsdfg.mooo.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ── Subscription page ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name update.linuxmirror.host;

    ssl_certificate     /etc/letsencrypt/live/linuxmirror.host/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linuxmirror.host/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── API: bot webhook + frontend ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.linuxmirror.host;

    ssl_certificate     /etc/letsencrypt/live/linuxmirror.host/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linuxmirror.host/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Telegram bot webhook — adjust path to match your bot config
    location /tg {
        proxy_pass         http://127.0.0.1:40080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend (runo-frontend, port-mapped to 127.0.0.1:3080)
    location / {
        proxy_pass         http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
server {
    listen 80;
    server_name testing-dsajgfsdfg.mooo.com update.linuxmirror.host api.linuxmirror.host;
    return 301 https://$host$request_uri;
}

# ── Catch-all: drop unknown SNI ────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    return 444;
}
