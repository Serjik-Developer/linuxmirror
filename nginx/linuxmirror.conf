# Xray Reality fallback + Reality dest → этот nginx на 127.0.0.1:8080
# Вставить в блок http {} или положить в /etc/nginx/conf.d/linuxmirror.conf
#
# В Xray inbound (порт 3050) нужно:
#   "fallbacks": [{ "dest": "127.0.0.1:8080" }]
#   "realitySettings": { "dest": "127.0.0.1:8080", "serverNames": ["linuxmirror.host"], ... }

upstream up_ubuntu        { server archive.ubuntu.com:80;        keepalive 8; }
upstream up_ubuntu_ports  { server ports.ubuntu.com:80;          keepalive 4; }
upstream up_ubuntu_sec    { server security.ubuntu.com:80;       keepalive 4; }
upstream up_debian        { server deb.debian.org:80;            keepalive 8; }
upstream up_debian_sec    { server security.debian.org:80;       keepalive 4; }
upstream up_archlinux     { server mirrors.kernel.org:80;        keepalive 4; }
upstream up_fedora        { server dl.fedoraproject.org:80;      keepalive 4; }
upstream up_centos        { server mirror.stream.centos.org:80;  keepalive 4; }
upstream up_rocky         { server download.rockylinux.org:80;   keepalive 4; }
upstream up_alpine        { server dl-cdn.alpinelinux.org:80;    keepalive 4; }
upstream up_opensuse      { server download.opensuse.org:80;     keepalive 4; }
upstream up_kali          { server http.kali.org:80;             keepalive 4; }
upstream up_nixos         { server channels.nixos.org:80;        keepalive 4; }
upstream up_gentoo        { server distfiles.gentoo.org:80;      keepalive 4; }

# Reality selfSNI dest — Xray форвардит сюда TLS-хендшейк обычных клиентов.
# Должен иметь валидный сертификат для домена.
server {
    listen 127.0.0.1:8443 ssl;
    server_name linuxmirror.host ~^s\d+\.linuxmirror\.host$;

    ssl_certificate     /etc/letsencrypt/live/linuxmirror.host/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/linuxmirror.host/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL_REALITY:10m;

    root /var/www/linuxmirror;
    index index.html;
    server_tokens off;

    location = / { try_files /index.html =404; }
    location ~* \.(html|css|js|ico|svg|png|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }
}

# Fallback для не-VLESS трафика (plain HTTP, Xray уже снял TLS).
server {
    listen 127.0.0.1:8080;
    server_name linuxmirror.host ~^s\d+\.linuxmirror\.host$;

    root /var/www/linuxmirror;
    index index.html;
    server_tokens off;

    proxy_http_version  1.1;
    proxy_set_header    Host          $proxy_host;
    proxy_set_header    Connection    "";
    proxy_set_header    Authorization "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;

    # ── Public: static website ─────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    location ~* \.(html|css|js|ico|svg|png|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ── Protected: mirror proxy ────────────────────────────────────────

    location /ubuntu/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_ubuntu/ubuntu/;
    }

    location /ubuntu-security/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_ubuntu_sec/ubuntu/;
    }

    location /ubuntu-ports/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_ubuntu_ports/ubuntu-ports/;
    }

    location /debian/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_debian/debian/;
    }

    location /debian-security/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_debian_sec/debian-security/;
    }

    location /archlinux/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_archlinux/archlinux/;
    }

    location /fedora/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_fedora/fedora/;
    }

    location /centos/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_centos/;
    }

    location /rocky/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_rocky/pub/rocky/;
    }

    location /alpine/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_alpine/alpine/;
    }

    location /opensuse/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_opensuse/;
    }

    location /kali/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_kali/kali/;
    }

    location /nixos/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_nixos/;
    }

    location /gentoo/ {
        auth_basic "Linux Mirror";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://up_gentoo/;
    }
}
