# SNI bridge — single Russian server, all Xray inbounds local
# nginx reads SNI without terminating TLS, routes to the matching Xray inbound port.
#
# Port map:
#   ubuntu.linuxmirror.host      → 127.0.0.1:3051
#   debian.linuxmirror.host      → 127.0.0.1:3052
#   fedora.linuxmirror.host      → 127.0.0.1:3053
#   archlinux.linuxmirror.host   → 127.0.0.1:3054
#   nixos.linuxmirror.host       → 127.0.0.1:3055
#   opensuse.linuxmirror.host    → 127.0.0.1:3056
#
# Each Xray inbound: listen 127.0.0.1:<port>, VLESS+Reality
# Xray fallback → nginx :8080 (decoy website + mirror proxy)
#
# Place as /etc/nginx/bridge-stream.conf and include in stream {} block.

map $ssl_preread_server_name $backend {
    ubuntu.linuxmirror.host      127.0.0.1:3051;
    debian.linuxmirror.host      127.0.0.1:3052;
    fedora.linuxmirror.host      127.0.0.1:3053;
    archlinux.linuxmirror.host   127.0.0.1:3054;
    nixos.linuxmirror.host       127.0.0.1:3055;
    opensuse.linuxmirror.host    127.0.0.1:3056;
    linuxmirror.host             127.0.0.1:3051;
    default                      127.0.0.1:3051;
}

server {
    listen     443;
    listen     [::]:443;

    ssl_preread            on;

    proxy_pass             $backend;
    proxy_connect_timeout  10s;
    proxy_timeout          600s;
    proxy_buffer_size      16k;
}
